<!DOCTYPE html>
<html lang="pt-BR">
<head>


  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adoção — Safe-Paw</title>

  <style>
    :root{
      --primary:#2e7d32;
      --secondary:#a5d6a7;
      --accent:#ffb300;
      --dark:#1b5e20;
      --light:#f1f8f4;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:var(--light);
      color:#222;
      line-height:1.6;
    }

    header{
      background:var(--primary);
      color:#fff;
      padding:20px 0;
      position:sticky;
      top:0;
    }

    .container{
      width:90%;
      max-width:1100px;
      margin:auto;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    nav ul{
      list-style:none;
      display:flex;
      gap:20px;
    }

    nav a{
      color:#fff;
      text-decoration:none;
      font-weight:bold;
    }

    nav a:hover{color:var(--accent)}

    section{padding:60px 0}

    h2.section-title{
      text-align:center;
      margin-bottom:40px;
      color:var(--dark);
    }

    /* CARDS ANIMAIS */

    .grid{
      display:grid;
      gap:25px;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    }

    .card{
      background:#fff;
      border-radius:12px;
      padding:20px;
      box-shadow:0 4px 14px rgba(0,0,0,.08);
      text-align:center;
    }

    .card img{
      width:100%;
      border-radius:10px;
      margin-bottom:10px;
    }

    /* FORMULÁRIO */

    .form-section{
      background:#fff;
      padding:40px;
      border-radius:12px;
      box-shadow:0 4px 14px rgba(0,0,0,.08);
      max-width:700px;
      margin:auto;
    }

    form input, form select, form textarea{
      width:100%;
      padding:12px;
      margin:8px 0 18px;
      border-radius:6px;
      border:1px solid #ccc;
      font-size:1rem;
    }

    button{
      background:var(--accent);
      border:none;
      padding:14px;
      font-weight:bold;
      border-radius:6px;
      cursor:pointer;
      width:100%;
    }

    button:hover{background:#ffa000}

    footer{
      background:var(--dark);
      color:#fff;
      text-align:center;
      padding:25px 0;
      margin-top:40px;
    }
  </style>
</head>

<body>

<header>
  <div class="container">
    <nav>
      <h1>🐾 Safe-Paw</h1>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="adocao.html">Adoção</a></li>
        <li><a href="doacao.html">Doação</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
  </div>
</header>

<!-- ANIMAIS -->

<section>
  <div class="container">
    <h2 class="section-title">Animais para Adoção 🐶🐱</h2>

    <div class="grid">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1558788353-f76d92427f16" alt="Cachorro">
        <h3>Thor</h3>
        <p>Macho • 2 anos • Muito carinhoso</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1495360010541-f48722b34f7d" alt="Gato">
        <h3>Luna</h3>
        <p>Fêmea • 1 ano • Brincalhona</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131" alt="Gato">
        <h3>Mingau</h3>
        <p>Macho • 3 anos • Tranquilo</p>
      </div>

    </div>
  </div>
</section>

<!-- FORMULÁRIO -->

<section>
  <div class="container">

    <h2 class="section-title">Solicitar Adoção 💚</h2>

    <div class="form-section">

      <form>

  <!-- Configurações -->
  <input type="hidden" name="_subject" value="Solicitação de Adoção — Safe-Paw">
  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_template" value="table">

        <label>Nome completo</label>
        <input type="text" required>

        <label>Email</label>
        <input type="email" required>

        <label>Telefone / WhatsApp</label>
        <input type="tel" required>

        <label>Animal de interesse</label>
        <select required>
          <option value="">Selecione</option>
          <option>Thor</option>
          <option>Luna</option>
          <option>Mingau</option>
        </select>

        <label>Você mora em:</label>
        <select required>
          <option value="">Selecione</option>
          <option>Casa</option>
          <option>Apartamento</option>
        </select>

        <label>Conte um pouco sobre o ambiente e sua experiência com animais</label>
        <textarea rows="5" required></textarea>

        <button type="submit">Enviar Solicitação 🐾</button>

      </form>

    </div>

  </div>
</section>

<footer>
  <p>© 2026 Safe-Paw — Todos os direitos reservados 🐾</p>
</footer>

</body>
</html>
