<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contato — Safe-Paw</title>

  <style>
    :root{
      --primary:#2e7d32;
      --secondary:#a5d6a7;
      --accent:#ffb300;
      --dark:#1b5e20;
      --light:#f1f8f4;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:var(--light);
      color:#222;
      line-height:1.6;
    }

    header{
      background:var(--primary);
      color:#fff;
      padding:20px 0;
      position:sticky;
      top:0;
    }

    .container{
      width:90%;
      max-width:1100px;
      margin:auto;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    nav ul{
      list-style:none;
      display:flex;
      gap:20px;
    }

    nav a{
      color:#fff;
      text-decoration:none;
      font-weight:bold;
    }

    nav a:hover{color:var(--accent)}

    section{padding:60px 0}

    h2.section-title{
      text-align:center;
      margin-bottom:40px;
      color:var(--dark);
    }

    /* INFO CONTATO */

    .contact-info{
      text-align:center;
      margin-bottom:40px;
    }

    .contact-info p{
      margin:6px 0;
      font-size:1.05rem;
    }

    /* FORM */

    .form-section{
      background:#fff;
      padding:40px;
      border-radius:12px;
      box-shadow:0 4px 14px rgba(0,0,0,.08);
      max-width:700px;
      margin:auto;
    }

    label{
      font-weight:bold;
    }

    form input, form textarea, form select{
      width:100%;
      padding:12px;
      margin:8px 0 18px;
      border-radius:6px;
      border:1px solid #ccc;
      font-size:1rem;
    }

    button{
      background:var(--accent);
      border:none;
      padding:14px;
      font-weight:bold;
      border-radius:6px;
      cursor:pointer;
      width:100%;
      font-size:1rem;
    }

    button:hover{background:#ffa000}

    footer{
      background:var(--dark);
      color:#fff;
      text-align:center;
      padding:25px 0;
      margin-top:40px;
    }
  </style>
</head>

<body>

<header>
  <div class="container">
    <nav>
      <h1>🐾 Safe-Paw</h1>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="adocao.html">Adoção</a></li>
        <li><a href="doacao.html">Doação</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
  </div>
</header>

<section>
  <div class="container">

    <h2 class="section-title">Fale com a Safe-Paw 💚🐾</h2>

    <!-- INFORMAÇÕES -->

    <div class="contact-info">
      <p>📧 Email: contato@safepaw.org</p>
      <p>📱 WhatsApp: (00) 00000-0000</p>
      <p>📍 Atendemos por agendamento</p>
      <p>📸 Instagram: @safepaw</p>
    </div>

    <!-- FORMULÁRIO -->

    <div class="form-section">

      <form>

        <label>Nome completo</label>
        <input type="text" required>

        <label>Email</label>
        <input type="email" required>

        <label>Telefone / WhatsApp</label>
        <input type="tel">

        <label>Assunto</label>
        <select required>
          <option value="">Selecione</option>
          <option>Adoção</option>
          <option>Doação</option>
          <option>Voluntariado</option>
          <option>Resgate de animal</option>
          <option>Parcerias</option>
          <option>Outro</option>
        </select>

        <label>Mensagem</label>
        <textarea rows="5" required></textarea>

        <button type="submit">Enviar mensagem 🐾</button>

      </form>

    </div>

  </div>
</section>

<footer>
  <p>© 2026 Safe-Paw — Todos os direitos reservados 🐾</p>
</footer>

</body>
</html>
